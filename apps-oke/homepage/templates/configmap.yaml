# Homepage config — synced with pico.local. To update:
#   ssh pico.local "cat /home/steve/dashboards/homepage/config/{settings,services,widgets,bookmarks,docker,kubernetes}.yaml"
# and paste here. Both copies are then driven from this ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homepage.fullname" . }}-config
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
data:
  settings.yaml: |
    title: Steve's Homelab
    theme: dark
    color: slate
    headerStyle: boxed
    layout:
      Media:
        icon: mdi-television-play
        style: row
        columns: 4
      Photos:
        icon: mdi-camera
        style: row
        columns: 2
      Infrastructure:
        icon: mdi-server
        style: row
        columns: 4
      Security:
        icon: mdi-shield-lock
        style: row
        columns: 2
      Automation:
        icon: mdi-robot
        style: row
        columns: 2
      Tools:
        icon: mdi-tools
        style: row
        columns: 3
      Custom Apps:
        icon: mdi-application
        style: row
        columns: 4
  services.yaml: |
    - Media:
        - Plex:
            href: https://plex.stevegore.au
            description: Media Server
            icon: plex.png
            check: https
        - Sonarr:
            href: http://pico:8989
            description: TV Show Management
            icon: sonarr.png
            check: http
        - Radarr:
            href: http://pico:7878
            description: Movie Management
            icon: radarr.png
            check: http
        - Jackett:
            href: http://pico:9117
            description: Torrent Indexer
            icon: jackett.png
            check: http
        - Transmission:
            href: http://pico:9092
            description: BitTorrent (Windscribe VPN)
            icon: transmission.png
            check: http
        - FlareSolverr:
            href: http://pico:8191
            description: Cloudflare bypass for Jackett
            icon: mdi-shield-bug
            check: http

    - Photos:
        - Immich:
            href: https://immich.stevegore.au
            description: Photo & Video Backup
            icon: immich.png
            check: https
        - icloudpd:
            description: iCloud photo downloader (hourly sync)
            icon: mdi-apple-icloud

    - Infrastructure:
        - Portainer:
            href: https://port.stevegore.au
            description: Container Management
            icon: portainer.png
            check: https
        - Uptime Kuma:
            href: https://uptime.stevegore.au
            description: Uptime & status monitoring
            icon: uptime-kuma.png
            check: https
        - Home Assistant:
            href: https://hass.stevegore.au
            description: Smart Home
            icon: home-assistant.png
            check: https
        - ArgoCD:
            href: https://argocd.stevegore.au
            description: GitOps — OKE
            icon: argocd.png
            check: https
        - Duplicati:
            href: http://pico:8200
            description: Backup & Recovery
            icon: duplicati.png
            check: http
        - Tailscale:
            href: https://login.tailscale.com/admin/machines
            description: Mesh VPN — admin
            icon: tailscale.png
            check: https

    - Security:
        - Vaultwarden:
            href: https://bw.stevegore.au
            description: Password Manager
            icon: bitwarden.png
            check: https
        - Vault:
            href: https://vault.stevegore.au
            description: Secrets Management — OKE
            icon: hashicorp-vault.png
            check: https

    - Automation:
        - Huginn:
            href: https://huggin.stevegore.au
            description: Workflow Automation
            icon: huginn.png
            check: https
        - Home Assistant:
            href: https://hass.stevegore.au
            description: Smart Home Automations
            icon: home-assistant.png
            check: https

    - Tools:
        - Stirling PDF:
            href: https://pdf.stevegore.au
            description: PDF Manipulation
            icon: stirling-pdf.png
            check: https
        - Duplicati:
            href: http://pico:8200
            description: Backup Manager
            icon: duplicati.png
            check: http
        - phpMyAdmin:
            href: http://pico:3011
            description: Huginn Database
            icon: phpmyadmin.png
            check: http

    - Custom Apps:
        - NuraSpace:
            href: https://desk.stevegore.au
            description: NuraSpace App
            icon: mdi-desk
            check: https
        - GymBooking:
            href: https://gym.stevegore.au
            description: Elixr Gym Reservations
            icon: mdi-dumbbell
            check: https
        - StravaKeeper:
            href: https://strava.stevegore.au
            description: Strava Data Archiver
            icon: strava.png
            check: https
        - StravaBot:
            href: http://pico:8082
            description: Strava Bot (Rust)
            icon: strava.png
            check: http
        - ttyd Terminal:
            href: https://stevegore.au
            description: Public Web Terminal
            icon: mdi-console
            check: https
        - GoldenBoards:
            description: Golden Boards (Go, no UI)
            icon: mdi-trophy
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23

    - openmeteo:
        label: Sydney
        latitude: -33.8688
        longitude: 151.2093
        timezone: Australia/Sydney
        units: metric
        cache: 5

    - search:
        provider: google
        target: _blank

    - iframe:
        url: https://stats.stevegore.au
  bookmarks.yaml: |
    - Domains:
        - stevegore.au:
            - abbr: SG
              href: https://stevegore.au
        - Cloudflare:
            - abbr: CF
              href: https://dash.cloudflare.com
        - Oracle Cloud:
            - abbr: OCI
              href: https://cloud.oracle.com

    - Repos:
        - infra:
            - abbr: GH
              href: https://github.com/stevegore/infra
  docker.yaml: |
    {}
  kubernetes.yaml: |
    mode: cluster
  custom.css: |
    /* custom styles */
  custom.js: |
    /* custom js */
