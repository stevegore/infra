headlamp:
  replicaCount: 1

  image:
    # Chart appVersion omits the 'v' but GHCR tags have it
    tag: "v0.42.0"
    pullPolicy: IfNotPresent

  config:
    # Skip token login screen — pod uses its own SA token to talk to the k8s API.
    # Gate access via Caddy adminonly instead of relying on this for security.
    extraArgs:
      - "--unsafe-use-serviceaccount-token"

  serviceAccount:
    create: true

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 30

  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10

