# ApplicationSet for the OKE cluster.
#
# Mirrors argocd/applicationset.yaml (the ampere MicroK8s one) but:
#   - Name: `infra-oke-apps`  — distinct so the two can't collide if both
#     are accidentally kubectl-applied to the same cluster.
#   - Generator path: `apps-oke/*` — picks up the OKE-only charts that
#     reference OCI-only primitives (NLB annotations, oci-bv storage class,
#     OCIR images, Tailscale operator).
#
# Apply once on the new OKE cluster during Phase 2 of the migration:
#   kubectl apply -f argocd/applicationset-oke.yaml
#
# Post-Phase-7 consolidation (after ampere is decommissioned):
#   git mv apps-oke/* apps/
#   then drop this file and reuse argocd/applicationset.yaml — Application
#   names are basename-driven, so the source.path field updates in place.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-oke-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/stevegore/infra.git
        revision: HEAD
        directories:
          - path: apps-oke/*
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/stevegore/infra.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # The tailscale-operator rewrites pico's externalName to point at the
        # proxy pod once it's up. Ignore that field so ArgoCD doesn't revert it.
        - group: ""
          kind: Service
          name: pico
          jsonPointers:
            - /spec/externalName
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
