# Standalone ArgoCD Application for the cluster networking policy and
# observability layer. It is intentionally outside apps/*: the CNI is a
# bootstrap dependency of ArgoCD itself and must never be accidentally pruned.
#
# This file is not self-managed. Apply it after pushing changes:
#   kubectl apply --server-side -f argocd/cilium-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stevegore/infra.git
    targetRevision: HEAD
    path: cilium
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
