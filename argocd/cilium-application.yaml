# Standalone ArgoCD Application for the cluster CNI policy/observability layer.
#
# Deliberately NOT generated by argocd/applicationset.yaml (which globs apps/*
# with prune+selfHeal). The CNI is a bootstrap-level dependency of ArgoCD
# itself, so:
#   * prune is DISABLED — ArgoCD must never delete the CNI out from under the
#     cluster (that would partition every pod, including ArgoCD).
#   * no resources-finalizer — deleting this Application leaves Cilium running;
#     removal is a deliberate, documented procedure (helm/app delete + rolling
#     node replace), not an accidental `kubectl delete app`.
#
# NOT self-managed: like the ApplicationSet, apply changes to THIS file by hand:
#   kubectl apply -f argocd/cilium-application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stevegore/infra.git
    targetRevision: HEAD
    path: cilium
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false      # never prune the CNI
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
