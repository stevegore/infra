apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/stevegore/infra.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/stevegore/infra.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # The tailscale-operator rewrites pico's externalName to point at the
        # proxy pod once it's up. Ignore that field so ArgoCD doesn't revert it.
        - group: ""
          kind: Service
          name: pico
          jsonPointers:
            - /spec/externalName
        # CNPG bootstrap is immutable after cluster creation. When recovery is
        # reverted to initdb in values.yaml, the live cluster retains the
        # recovery bootstrap spec — suppress the resulting OutOfSync diff.
        - group: "postgresql.cnpg.io"
          kind: Cluster
          jsonPointers:
            - /spec/bootstrap
            - /spec/externalClusters
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
