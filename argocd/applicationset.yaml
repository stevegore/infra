apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/stevegore/infra.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/stevegore/infra.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # The tailscale-operator rewrites pico's externalName to point at the
        # proxy pod once it's up. Ignore that field so ArgoCD doesn't revert it.
        - group: ""
          kind: Service
          name: pico
          jsonPointers:
            - /spec/externalName
        # CNPG admission webhook injects defaults into Cluster spec after
        # creation (affinity, enablePDB, logLevel, etc.) that aren't in the
        # rendered Helm chart. Ignore them so ArgoCD doesn't loop trying to
        # remove them. Also ignore bootstrap/externalClusters because they're
        # immutable after first reconcile.
        - group: "postgresql.cnpg.io"
          kind: Cluster
          jsonPointers:
            - /spec/bootstrap
            - /spec/externalClusters
            - /spec/affinity
            - /spec/enablePDB
            - /spec/enableSuperuserAccess
            - /spec/failoverDelay
            - /spec/logLevel
            - /spec/backup/target
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
