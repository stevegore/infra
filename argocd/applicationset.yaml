apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/stevegore/infra.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/stevegore/infra.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # The tailscale-operator rewrites pico's externalName to point at the
        # proxy pod once it's up. Ignore that field so ArgoCD doesn't revert it.
        - group: ""
          kind: Service
          name: pico
          jsonPointers:
            - /spec/externalName
        # CNPG admission webhook injects defaults into Cluster spec (affinity,
        # enablePDB, logLevel, storage.resizeInUseVolumes, role connectionLimit,
        # backup.target, bootstrap.recovery.database/owner, etc.) that aren't
        # in the rendered Helm chart, causing a persistent sync loop.
        # managedFieldsManagers ignores all fields owned by CNPG's controller
        # ("manager" is the fieldManager name CNPG uses for spec defaulting).
        # jsonPointers additionally suppresses bootstrap/externalClusters which
        # are immutable after first reconcile (ArgoCD owns those fields, not
        # CNPG's manager, so managedFieldsManagers alone doesn't suppress them).
        - group: "postgresql.cnpg.io"
          kind: Cluster
          managedFieldsManagers:
            - manager
          jsonPointers:
            - /spec/bootstrap
            - /spec/externalClusters
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
