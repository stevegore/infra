apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/stevegore/infra.git
        revision: HEAD
        directories:
          - path: apps/*
  template:
    metadata:
      name: '{{.path.basename}}'
      namespace: argocd
      labels:
        app.kubernetes.io/managed-by: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/stevegore/infra.git
        targetRevision: HEAD
        path: '{{.path.path}}'
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basename}}'
      ignoreDifferences:
        # The tailscale-operator rewrites pico's externalName to point at the
        # proxy pod once it's up. Ignore that field so ArgoCD doesn't revert it.
        - group: ""
          kind: Service
          name: pico
          jsonPointers:
            - /spec/externalName
        # CNPG's mutating admission webhook injects spec defaults at creation
        # time that aren't in the rendered Helm chart. These defaults are NOT
        # tracked in managed-fields (webhook, not controller update), so
        # managedFieldsManagers doesn't suppress them — explicit jsonPointers
        # are required. RespectIgnoreDifferences=true prevents ArgoCD from
        # trying to apply changes to these fields and causing a sync loop.
        - group: "postgresql.cnpg.io"
          kind: Cluster
          jsonPointers:
            - /spec/bootstrap           # immutable; recovery subfields injected by webhook
            - /spec/externalClusters    # immutable after first reconcile
            - /spec/affinity            # podAntiAffinityType: preferred
            - /spec/backup/target       # prefer-standby
            - /spec/enablePDB           # true
            - /spec/enableSuperuserAccess # false
            - /spec/failoverDelay       # 0
            - /spec/logLevel            # info
            - /spec/storage/resizeInUseVolumes # true
            - /spec/managed/roles       # connectionLimit/-1 and inherit/true per role
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
