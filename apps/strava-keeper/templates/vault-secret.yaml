{{- if .Values.vault.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "strava-keeper.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.path }}
  destination:
    name: {{ .Values.vault.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ include "strava-keeper.fullname" . }}
  # Restart the Deployment when VSO writes a new secret version — env is
  # injected via secretKeyRef and only re-read on pod start.
  rolloutRestartTargets:
    - kind: Deployment
      name: {{ include "strava-keeper.fullname" . }}
{{- end }}
