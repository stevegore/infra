apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: argocd
  namespace: argocd
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vault-secrets-operator
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: argocd-github-oauth
  namespace: argocd
spec:
  type: kv-v2
  mount: kv
  path: argocd
  destination:
    name: argocd-github-oauth
    create: true
    labels:
      app.kubernetes.io/part-of: argocd
  refreshAfter: 1h
  vaultAuthRef: argocd
  # Dex reads the GitHub OAuth secret at startup — restart it on rotation.
  # (upstream argocd chart Deployment name)
  rolloutRestartTargets:
    - kind: Deployment
      name: argocd-dex-server
