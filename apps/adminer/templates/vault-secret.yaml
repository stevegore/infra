{{- if .Values.vault.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: adminer
  namespace: {{ .Release.Namespace }}
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: {{ .Values.vault.authRole }}
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: adminer-pg
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: kv
  path: {{ .Values.vault.postgres.path }}
  destination:
    name: {{ .Values.vault.postgres.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: adminer
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: adminer-mysql
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: kv
  path: {{ .Values.vault.mysql.path }}
  destination:
    name: {{ .Values.vault.mysql.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: adminer
{{- end }}
