# 2 replicas for HA. caddy is now stateless w.r.t. auth: caddy-security was
# replaced by Authentik forward_auth (Authentik holds all session/OAuth state),
# and ACME certs are shared via OCI Object Storage. The old per-pod-state
# constraint that forced a single replica is gone. Anti-affinity spreads the
# two pods across the fault domains (see podAntiAffinity below).
replicaCount: 2

image:
  # Built from apps/caddy/Dockerfile, pushed to OCI Container Registry (Always Free, 5 GB).
  # Bump the tag suffix when xcaddy plugins or upstream Caddy change.
  repository: syd.ocir.io/sdajdczqv0qo/caddy
  tag: "2.11.3-stevegore.1"
  pullPolicy: IfNotPresent

# OCI Container Registry requires auth — create the secret out of band:
#   kubectl -n caddy create secret docker-registry ocir-creds \
#     --docker-server=syd.ocir.io \
#     --docker-username='sdajdczqv0qo/<oci-user>' \
#     --docker-password='<auth-token>' \
#     --docker-email=steve.j.gore@gmail.com
imagePullSecrets:
  - name: ocir-creds

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

service:
  # type LoadBalancer triggers the OCI CCM to provision an NLB.
  # The reserved-ip annotation reuses publicip20230914115348 (the same address
  # currently on the ampere VNIC) so Cloudflare DNS records don't have to change.
  type: LoadBalancer
  annotations:
    oci.oraclecloud.com/load-balancer-type: "nlb"
    # OCI NLB has no reserved-IP annotation; spec.loadBalancerIP is the CCM
    # mechanism for both classic LB and NLB. Set via service.loadBalancerIP below.
    # Preserve client source IPs at L4 (NLB pass-through) and stop kube-proxy
    # SNAT so caddy-security's IP-based rules see the real client.
    oci.oraclecloud.com/oci-network-load-balancer-external-traffic-policy: "Local"
    # Tell the OCI CCM to manage security list rules on both the NLB subnet
    # (frontend) and the worker node subnet (backend NodePorts). Without this the
    # CCM defaults to None and NodePort rules must be added manually.
    oci-network-load-balancer.oraclecloud.com/security-list-management-mode: "All"
    # NLB backend hash policy. Default FIVE_TUPLE hashes src+dst IP/port+proto,
    # so different TCP connections from the same client land on different
    # nodes/pods. caddy-security keeps OAuth flow state (AUTHP_SESSION_ID →
    # redirect_url) in-process per pod, so a callback landing on a different
    # pod than the one that started the flow loses the redirect and dumps the
    # user on auth.stevegore.au. THREE_TUPLE hashes src IP / dst IP / proto,
    # pinning all connections from one client IP to the same backend node
    # (paired with anti-affinity → same pod). FIVE_TUPLE/TWO_TUPLE/THREE_TUPLE
    # are the only values OCI NLB accepts.
    oci-network-load-balancer.oraclecloud.com/backend-policy: "THREE_TUPLE"
  # externalTrafficPolicy=Local pairs with the NLB pass-through above.
  externalTrafficPolicy: Local
  # Reserved public IP minted in terraform/nlb.tf — survives NLB recreation.
  # The OCI CCM looks up the OCID via this IP address at LB creation time.
  # Address: 159.13.44.68 — point Cloudflare DNS here in Phase 5.
  loadBalancerIP: "159.13.44.68"
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
    # UDP 443 (HTTP/3) intentionally omitted. The OCI CCM rejects any
    # security-list-management-mode other than "None" when a UDP listener is
    # present, which would force us to hand-manage worker-subnet NodePort
    # rules. Public security list doesn't open UDP 443 anyway, so HTTP/3
    # wasn't reaching clients end-to-end. Caddy stays on h1/h2 over TCP.

# OCI Object Storage S3-compat endpoint for certmagic-s3.
# Bucket created out-of-band; vault-instances dynamic group has manage objects
# on it (extend the existing policy when provisioning).
s3:
  host: sdajdczqv0qo.compat.objectstorage.ap-sydney-1.oraclecloud.com
  bucket: caddy-acme
  prefix: certmagic

# Email used for Let's Encrypt registration.
acmeEmail: steve.j.gore@gmail.com

# VSO config — pulls TWO Vault secrets:
#   config:  kv/caddy/config — app-specific creds (github oauth + JWT keys)
#       fields: github_client_id, github_client_secret,
#               jwt_private_key, jwt_public_key
#   s3:      kv/oci/caddy-acme — OCI Customer Secret Key for the S3 bucket
#       fields: access_key, secret_key  (plus metadata ignored here)
# Split because the S3 key lives in kv/oci/* (canonical OCI namespace,
# minted by scripts/provision-caddy-acme-creds.sh) while config is per-app.
vault:
  enabled: true
  mount: kv
  refreshAfter: 1h
  # Existing VSO ClusterRoleBinding role from bootstrap.
  authRole: vault-secrets-operator
  config:
    path: caddy/config
    secretName: caddy-config
  s3:
    path: oci/caddy-acme
    secretName: caddy-acme-s3

# Pod-level placement.
podAntiAffinity:
  # Spread the 2 replicas across the 2 fault domains so a single-node loss
  # doesn't take Caddy down. Required (not preferred) — we explicitly want
  # to fail to schedule rather than silently land both on the same node.
  enabled: true

# Pico reachability via the Tailscale Operator's Egress Service pattern.
# Creates a Service named `pico` in this namespace. The operator watches for
# the `tailscale.com/tailnet-fqdn` annotation, spawns a proxy pod that joins
# the tailnet and resolves pico's MagicDNS name, and rewrites the Service to
# point at it. Caddyfile upstreams use `pico:<port>` and never see the
# tailnet name or 100.x IP — so this stays portable across tailnet renames.
pico:
  enabled: true
  # MagicDNS name for pico inside the tailnet `stevegore.github`
  # (suffix `chipmunk-fir.ts.net`). Confirm with `tailscale status` on pico
  # before changing — a tailnet rename would invalidate this.
  tailnetFqdn: pico.chipmunk-fir.ts.net
  # Ports the proxy needs to forward. Keep in sync with the upstream lines
  # in templates/configmap.yaml.
  ports:
    - { name: hass,    port: 8123  }
    - { name: desk,    port: 8111  }
    - { name: gym,     port: 8112  }
    - { name: plex,    port: 32400 }
    - { name: immich,       port: 2283  }
    - { name: photoprism,  port: 2342  }
    - { name: port,        port: 9000  }
    - { name: huginn,  port: 3000  }
    - { name: pdf,     port: 8083  }
    - { name: strava,  port: 8180  }
