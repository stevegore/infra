apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "caddy.fullname" . }}-config
  labels:
    {{- include "caddy.labels" . | nindent 4 }}
data:
  Caddyfile: |
    {
      email {{ .Values.acmeEmail }}

      # DNS-01 challenge via Cloudflare — bypasses the need for ACME validators
      # to reach port 80/443 on the OCI NLB (which has multi-perspective
      # validation timeouts from some geographic vantage points).
      acme_dns cloudflare {env.CF_API_TOKEN}

      # Shared ACME state across both replicas — OCI Object Storage via the
      # S3-compat endpoint. Without this, each replica would race for ACME
      # certs and burn Let's Encrypt rate limits.
      storage s3 {
        host {env.S3_HOST}
        bucket {env.S3_BUCKET}
        access_id {env.AWS_ACCESS_KEY_ID}
        secret_key {env.AWS_SECRET_ACCESS_KEY}
        prefix {env.S3_PREFIX}
      }

      servers :443 {
        name stevegore
        protocols h1 h2 h2c
        strict_sni_host on
      }

      log default {
        output stdout
        format json
        exclude http.log.access
        level INFO
      }

    }

    (defaults) {
      encode gzip
    }

    # Authentik domain-level forward-auth. Protected vhosts `import authentik`
    # plus a reverse_proxy for /outpost.goauthentik.io/* (the outpost's own
    # endpoints). Unauthenticated requests get 302'd to auth.stevegore.au; the
    # outpost returns identity headers on success. Replaces caddy-security.
    (authentik) {
      forward_auth authentik-server.authentik.svc.cluster.local:80 {
        uri /outpost.goauthentik.io/auth/caddy
        copy_headers X-Authentik-Username X-Authentik-Groups X-Authentik-Email X-Authentik-Name X-Authentik-Uid X-Authentik-Jwt X-Authentik-Meta-Jwks X-Authentik-Meta-Outpost X-Authentik-Meta-Provider X-Authentik-Meta-App X-Authentik-Meta-Version
        trusted_proxies private_ranges
      }
    }

    # ----- Authentik (IdP + forward-auth embedded outpost) -----

    auth.stevegore.au {
      reverse_proxy authentik-server.authentik.svc.cluster.local:80
      import defaults
    }

    # ----- Health -----

    healthz.stevegore.au {
      respond "OK"
    }

    # ----- In-cluster services -----

    vault.stevegore.au {
      # Vault handles its own GitHub auth on the UI; no caddy-security gate.
      reverse_proxy vault.vault.svc.cluster.local:8200
      import defaults
    }

    argocd.stevegore.au {
      # ArgoCD runs in --insecure mode (plain HTTP) — Caddy handles TLS termination
      reverse_proxy http://argocd-server.argocd.svc.cluster.local:80
    }

    grpc.argocd.stevegore.au {
      reverse_proxy h2c://argocd-server.argocd.svc.cluster.local:80
    }

    bw.stevegore.au {
      header / {
        Strict-Transport-Security "max-age=31536000;"
        X-XSS-Protection "1; mode=block"
        X-Frame-Options "DENY"
        X-Robots-Tag "none"
        -Server
      }
      reverse_proxy /notifications/hub/negotiate vaultwarden.vaultwarden.svc.cluster.local:80
      reverse_proxy /notifications/hub vaultwarden.vaultwarden.svc.cluster.local:3012
      reverse_proxy vaultwarden.vaultwarden.svc.cluster.local:80 {
        header_up X-Real-IP {remote_host}
      }
      import defaults
    }

    homepage.stevegore.au {
      reverse_proxy /outpost.goauthentik.io/* authentik-server.authentik.svc.cluster.local:80
      import authentik
      reverse_proxy homepage.homepage.svc.cluster.local:3000
      import defaults
    }

    uptime.stevegore.au {
      reverse_proxy uptime-kuma.uptime-kuma.svc.cluster.local:3001
      import defaults
    }

    # Custom-domain alias for the public 'homelab' status page. Uptime Kuma
    # serves the right page at / based on Host header via status_page_cname
    # (managed by scripts/setup_status_page.py).
    status.stevegore.au {
      reverse_proxy uptime-kuma.uptime-kuma.svc.cluster.local:3001
      import defaults
    }

    adminer.stevegore.au {
      reverse_proxy /outpost.goauthentik.io/* authentik-server.authentik.svc.cluster.local:80
      import authentik
      reverse_proxy adminer.adminer.svc.cluster.local:80
      import defaults
    }

    headlamp.stevegore.au {
      reverse_proxy /outpost.goauthentik.io/* authentik-server.authentik.svc.cluster.local:80
      import authentik
      reverse_proxy headlamp.headlamp.svc.cluster.local:80
      import defaults
    }

    # ----- Pico-hosted services (via Tailscale Egress Service) -----
    # `pico` resolves to the in-namespace ExternalName Service created by the
    # Tailscale operator (see templates/pico-egress.yaml). The operator runs a
    # proxy pod that forwards each port over the tailnet to pico's MagicDNS
    # name. No 10.20.30.0/24 dependency; no need to know the tailnet name
    # here — it lives only in values.yaml.

    hass.stevegore.au {
      reverse_proxy pico:8123
      import defaults
    }

    desk.stevegore.au {
      reverse_proxy /outpost.goauthentik.io/* authentik-server.authentik.svc.cluster.local:80
      import authentik
      reverse_proxy pico:8111
      import defaults
    }

    gym.stevegore.au {
      reverse_proxy /outpost.goauthentik.io/* authentik-server.authentik.svc.cluster.local:80
      import authentik
      reverse_proxy pico:8112
      import defaults
    }

    plex.stevegore.au {
      reverse_proxy pico:32400
      import defaults
    }

    immich.stevegore.au {
      reverse_proxy pico:2283
      import defaults
    }

    photoprism.stevegore.au {
      reverse_proxy pico:2342
      import defaults
    }

    port.stevegore.au {
      reverse_proxy pico:9000
      import defaults
    }

    huginn.stevegore.au {
      reverse_proxy pico:3000
      import defaults
    }

    pdf.stevegore.au {
      reverse_proxy pico:8083
    }

    strava.stevegore.au {
      reverse_proxy strava-keeper.strava-keeper.svc.cluster.local:8180
    }

    stats.stevegore.au {
      reverse_proxy pico:8001
      import defaults
    }

    photos.stevegore.au {
      reverse_proxy pico:2283
      import defaults
    }

    stevegore.au {
      respond /health "I'm doing ok, thanks for asking :)"
      respond /healthz "I'm doing ok, thanks for asking :)"
      reverse_proxy ttyd.ttyd.svc.cluster.local:8788
      import defaults
    }
