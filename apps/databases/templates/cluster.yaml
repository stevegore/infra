apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-shared
spec:
  instances: {{ .Values.postgres.instances }}
  imageName: {{ .Values.postgres.imageName }}

  storage:
    storageClass: {{ .Values.postgres.storageClass }}
    size: {{ .Values.postgres.storageSize }}

  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}
{{- if .Values.backup.enabled }}

  # OCI Object Storage's S3-compatible API rejects boto3/botocore 1.36+'s default
  # streaming-checksum upload (aws-chunked, omits Content-Length) with
  # "MissingContentLength: The Content-Length header is required". Forcing both
  # checksum modes to when_required makes barman-cloud send a classic PutObject
  # with Content-Length. Without this, WAL archiving + base backups fail.
  env:
    - name: AWS_REQUEST_CHECKSUM_CALCULATION
      value: when_required
    - name: AWS_RESPONSE_CHECKSUM_VALIDATION
      value: when_required
{{- end }}
{{- if .Values.consumers }}

  # Per-app login roles. Each role's password comes from a basic-auth Secret
  # (username/password) synced by VSO from Vault into this namespace. The
  # matching databases are created by Database CRs in consumers.yaml.
  managed:
    roles:
    {{- range .Values.consumers }}
      - name: {{ .name }}
        ensure: present
        login: true
        passwordSecret:
          name: {{ .passwordSecret }}
    {{- end }}
{{- end }}

  # Bootstrap: either fresh initdb or barman-source recovery.
  # Set recovery.enabled=true temporarily to restore from the barman backup;
  # revert to false once recovery is complete (bootstrap is immutable after
  # cluster creation, so CNPG ignores the change — ignoreDifferences in the
  # ApplicationSet suppresses the resulting ArgoCD OutOfSync noise).
{{- if .Values.recovery.enabled }}
  externalClusters:
    - name: {{ .Values.recovery.sourceName }}
      barmanObjectStore:
        destinationPath: s3://{{ .Values.backup.bucket }}/{{ .Values.backup.destinationPrefix }}
        endpointURL: {{ .Values.backup.endpointURL | quote }}
        s3Credentials:
          accessKeyId:
            name: {{ .Values.vault.secretName }}
            key: access_key
          secretAccessKey:
            name: {{ .Values.vault.secretName }}
            key: secret_key
        wal:
          compression: {{ .Values.backup.wal.compression }}
        data:
          compression: {{ .Values.backup.data.compression }}
  bootstrap:
    recovery:
      source: {{ .Values.recovery.sourceName }}
{{- else }}
  bootstrap:
    initdb:
      database: app
      owner: app
{{- end }}
{{- if .Values.backup.enabled }}

  # Continuous WAL archiving + base backups to OCI Object Storage (S3-compat).
  # In-tree barmanObjectStore is deprecated in CNPG v1.26+ but fully functional
  # in v1.29.1; chosen over the Barman Cloud Plugin to avoid a cert-manager
  # dependency. See values.yaml `backup:` for the full rationale. Creds are the
  # OCI Customer Secret Key synced from Vault by VSO into Secret
  # `{{ .Values.vault.secretName }}` (keys access_key / secret_key).
  backup:
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: s3://{{ .Values.backup.bucket }}/{{ .Values.backup.destinationPrefix }}
      endpointURL: {{ .Values.backup.endpointURL | quote }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.vault.secretName }}
          key: access_key
        secretAccessKey:
          name: {{ .Values.vault.secretName }}
          key: secret_key
      wal:
        compression: {{ .Values.backup.wal.compression }}
      data:
        compression: {{ .Values.backup.data.compression }}
{{- end }}
