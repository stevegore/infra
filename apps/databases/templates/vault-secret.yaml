{{- if .Values.vault.enabled }}
# vault-secrets-operator pulls the OCI Customer Secret Key (S3 HMAC creds) from
# Vault into a k8s Secret in this namespace. CNPG's barmanObjectStore reads
# access_key / secret_key from that Secret for WAL archiving + base backups.
# Mirrors apps/caddy's caddy-acme-s3 pattern; Vault path is kv/oci/pg-backups.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: pg-backups
  namespace: {{ .Release.Namespace }}
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: {{ .Values.vault.authRole }}
    serviceAccount: {{ .Values.vault.serviceAccount }}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: pg-backups-s3
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.path }}
  destination:
    name: {{ .Values.vault.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: pg-backups
{{- end }}
