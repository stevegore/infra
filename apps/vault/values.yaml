# Vault Helm chart wrapper - OCI KMS auto-unseal + Object Storage backend
# Only overrides are specified here; upstream defaults apply otherwise

vault:
  global:
    enabled: true

  injector:
    enabled: false  # Not using sidecar injection

  server:
    enabled: true
    
    # Resource limits for Ampere A1
    resources:
      requests:
        memory: 256Mi
        cpu: 250m
      limits:
        memory: 512Mi
        cpu: 500m

    # Single-node standalone mode
    ha:
      enabled: false
    
    standalone:
      enabled: true
      config: |
        ui = true
        
        listener "tcp" {
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_disable = 1  # Caddy handles TLS termination

          # Trust X-Forwarded-For from Caddy (host loopback) and the cluster
          # network. Combined with externalTrafficPolicy=Local on the Service,
          # Vault always sees the real client IP — required for AppRole
          # token_bound_cidrs / secret_id_bound_cidrs to work.
          x_forwarded_for_authorized_addrs       = "127.0.0.0/8,10.0.0.0/8"
          x_forwarded_for_reject_not_authorized  = false
          x_forwarded_for_reject_not_present     = false
          x_forwarded_for_hop_skips              = 0
        }
        
        storage "oci" {
          namespace_name = "sdajdczqv0qo"
          bucket_name = "vault-storage"
          ha_enabled = "false"
          auth_type_api_key = "false"  # Use instance principal
        }
        
        seal "ocikms" {
          key_id = "ocid1.key.oc1.ap-sydney-1.fnuxtwyhaahla.abzxsljrgzjola7olf2nj27fljzgkqx5vdwq5f44g7n6wse3awmsoee2imfa"
          crypto_endpoint = "https://fnuxtwyhaahla-crypto.kms.ap-sydney-1.oraclecloud.com"
          management_endpoint = "https://fnuxtwyhaahla-management.kms.ap-sydney-1.oraclecloud.com"
          auth_type_api_key = "false"  # Use instance principal
        }
        
        # Telemetry for observability
        telemetry {
          disable_hostname = true
        }

    # Service configuration - NodePort for Caddy access
    service:
      enabled: true
      type: NodePort
      # Local preserves the real client source IP through the NodePort
      # (no kube-proxy SNAT), so Vault sees pico's WireGuard IP for
      # AppRole CIDR binding when accessed at http://10.20.30.2:30820.
      externalTrafficPolicy: Local
      nodePort: 30820
      port: 8200
      targetPort: 8200

    # Data storage (not used with OCI backend, but required by chart)
    dataStorage:
      enabled: false

    # Audit logs storage
    auditStorage:
      enabled: false

    # Environment variables for OCI config (set via secret)
    extraEnvironmentVars: {}

    # Annotations for instance principal
    annotations:
      oci.oraclecloud.com/instance-principal: "true"

  ui:
    enabled: true
    serviceType: NodePort
    serviceNodePort: 30821
