{{- if .Values.vault.enabled }}
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: {{ include "homepage.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: {{ .Values.vault.authRole }}
    serviceAccount: default
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "homepage.fullname" . }}-portainer
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.portainer.path }}
  destination:
    name: {{ .Values.vault.portainer.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: {{ include "homepage.fullname" . }}
  # Portainer API key is consumed via envFrom; restart on rotation.
  rolloutRestartTargets:
    - kind: Deployment
      name: {{ include "homepage.fullname" . }}
{{- end }}
