apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homepage.fullname" . }}
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "homepage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "homepage.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "homepage.fullname" . }}
      initContainers:
        - name: copy-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ['sh', '-c', 'mkdir -p /app/config && cp -r /config-source/* /app/config/ 2>/dev/null; true']
          volumeMounts:
            - name: config-source
              mountPath: /config-source
              readOnly: true
            - name: config-work
              mountPath: /app/config
      containers:
        - name: homepage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: {{ join "," .Values.allowedHosts | quote }}
          volumeMounts:
            - name: config-work
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config-source
          configMap:
            name: {{ include "homepage.fullname" . }}-config
        - name: config-work
          emptyDir: {}
        - name: logs
          emptyDir: {}
