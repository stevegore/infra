# Materializes the upstream chart's expected `operator-oauth` Secret with
# keys `client_id` + `client_secret` from kv/tailscale/operator_oauth.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: tailscale-operator-oauth
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: kv
  path: tailscale/operator_oauth
  destination:
    name: operator-oauth
    create: true
  refreshAfter: 1h
  vaultAuthRef: tailscale-operator
  # The operator reads operator-oauth at startup — restart it on rotation.
  # (upstream tailscale-operator chart Deployment name)
  rolloutRestartTargets:
    - kind: Deployment
      name: operator
