replicaCount: 1

image:
  repository: docker.io/nousresearch/hermes-agent
  tag: "v2026.5.29.2"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9119

resources:
  requests:
    memory: 512Mi
    cpu: 200m
  limits:
    memory: 2Gi
    cpu: 1000m

persistence:
  enabled: true
  size: 5Gi

podSecurityContext:
  fsGroup: 10000

hermes:
  dashboardInsecure: true
  telegramEnabled: true
  userTimezone: Australia/Sydney

# Secret created by Vault Secrets Operator (synced from Vault)
existingSecret: "hermes-credentials"

# VSO configuration
vault:
  enabled: true
  mount: kv
  path: hermes
  refreshAfter: 1h

networkPolicy:
  enabled: false
