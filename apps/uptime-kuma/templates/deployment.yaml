apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uptime-kuma.fullname" . }}
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate  # RWO PVC + single writer
  selector:
    matchLabels:
      {{- include "uptime-kuma.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "uptime-kuma.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: uptime-kuma
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          {{- if .Values.mysql.enabled }}
          env:
            - name: UPTIME_KUMA_DB_TYPE
              value: mariadb
            - name: UPTIME_KUMA_DB_HOSTNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: db_hostname
            - name: UPTIME_KUMA_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: db_port
            - name: UPTIME_KUMA_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: db_name
            - name: UPTIME_KUMA_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: db_username
            - name: UPTIME_KUMA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-db
                  key: db_password
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "uptime-kuma.fullname" . }}-data
