# Uptime Kuma — single replica + 50 GB OCI block volume for SQLite history.
# Lives on OKE so it can detect pico outages (proposal §8).
#
# SETUP: After deployment, configure monitors via https://uptime.stevegore.au:
# - pico-hosted services (hass, plex, etc.) via pico Egress Service (pico:<port>)
# - external services via DNS names (*.stevegore.au, *.local, etc.)
# Monitors are stored in the SQLite DB (PVC), so they persist across restarts.

replicaCount: 1

image:
  # FQ image name required by cri-o on OKE workers (short names rejected).
  repository: docker.io/louislam/uptime-kuma
  tag: "2.3.2"
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 1000m

service:
  type: ClusterIP
  port: 3001

# Pico reachability via the Tailscale Operator's Egress Service pattern.
# This gives Uptime Kuma direct access to pico-only services that do not sit
# behind Caddy, using the same `pico:<port>` indirection as the caddy chart.
pico:
  enabled: true
  tailnetFqdn: pico.chipmunk-fir.ts.net
  ports:
    - { name: ssh,          port: 22    }
    - { name: hass,         port: 8123  }
    - { name: desk,         port: 8111  }
    - { name: gym,          port: 8112  }
    - { name: plex,         port: 32400 }
    - { name: immich,       port: 2283  }
    - { name: portainer,    port: 9000  }
    - { name: huginn,       port: 3000  }
    - { name: pdf,          port: 8083  }
    - { name: strava,       port: 8180  }
    - { name: ttyd,         port: 8788  }
    - { name: radarr,       port: 7878  }
    - { name: sonarr,       port: 8989  }
    - { name: jackett,      port: 9117  }
    - { name: transmission, port: 9092  }
    - { name: flaresolverr, port: 8191  }
    - { name: duplicati,    port: 8200  }
    - { name: stravabot,    port: 8082  }
    - { name: photoprism,   port: 2342  }
    - { name: homepage,     port: 8080  }
    - { name: phpmyadmin,   port: 3011  }

persistence:
  # OCI block volume floor is 50 GB regardless of what's requested — pick the
  # floor so the storage budget is honest (proposal §7).
  size: 50Gi
  # OCI CSI BV class — RWO, expandable, can't shrink.
  storageClass: oci-bv
