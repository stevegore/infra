# Uptime Kuma — single replica, MySQL HeatWave backend (data survives cluster
# rebuilds), OCI block volume for /app/data (screenshots, uploads only).
# Lives on OKE so it can detect pico outages (proposal §8).
#
# SETUP (first install or after MySQL DB loss): create admin at
# https://uptime.stevegore.au, then run scripts/setup_uptime_kuma.py.

replicaCount: 1

image:
  # FQ image name required by cri-o on OKE workers (short names rejected).
  repository: docker.io/louislam/uptime-kuma
  tag: "2.4.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 1000m

service:
  type: ClusterIP
  port: 3001

# Pico reachability via the Tailscale Operator's Egress Service pattern.
# This gives Uptime Kuma direct access to pico-only services that do not sit
# behind Caddy, using the same `pico:<port>` indirection as the caddy chart.
pico:
  enabled: true
  tailnetFqdn: pico.chipmunk-fir.ts.net
  ports:
    - { name: ssh,          port: 22    }
    - { name: hass,         port: 8123  }
    - { name: desk,         port: 8111  }
    - { name: gym,          port: 8112  }
    - { name: plex,         port: 32400 }
    - { name: immich,       port: 2283  }
    - { name: portainer,    port: 9000  }
    - { name: huginn,       port: 3000  }
    - { name: pdf,          port: 8083  }
    - { name: strava,       port: 8180  }
    - { name: radarr,       port: 7878  }
    - { name: sonarr,       port: 8989  }
    - { name: jackett,      port: 9117  }
    - { name: transmission, port: 9092  }
    - { name: flaresolverr, port: 8191  }
    - { name: duplicati,    port: 8200  }
    - { name: stravabot,    port: 8082  }
    - { name: photoprism,   port: 2342  }
    - { name: homepage,     port: 8080  }
    - { name: phpmyadmin,   port: 3011  }

persistence:
  # OCI block volume floor is 50 GB regardless of what's requested.
  # Even with MySQL backend this PVC is kept for /app/data (screenshots, uploads).
  size: 50Gi
  storageClass: oci-bv

# MySQL backend — uses the OCI MySQL HeatWave Free instance shared with
# Vaultwarden (separate database: uptime_kuma). Credentials synced from
# Vault kv/uptime-kuma/config by VSO into k8s Secret uptime-kuma-db.
# With MySQL, monitor data survives cluster rebuilds (no pre-snapshot needed).
mysql:
  enabled: true
  vault:
    path: uptime-kuma/config
    authRole: vault-secrets-operator
