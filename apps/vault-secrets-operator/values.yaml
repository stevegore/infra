vault-secrets-operator:
  defaultVaultConnection:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    skipTLSVerify: true

  # FQ image names required by cri-o on OKE workers (short names rejected).
  controller:
    manager:
      image:
        repository: docker.io/hashicorp/vault-secrets-operator
      kubeRbacProxy:
        image:
          repository: quay.io/brancz/kube-rbac-proxy
