{{- if .Values.vault.enabled }}
# Pulls kv/authentik/config from Vault into the `authentik-config` k8s Secret.
# Expected keys (seed these in Vault, see app README / runbook):
#   secret_key            - AUTHENTIK_SECRET_KEY (cookie signing; never rotate after install)
#   username              - "authentik" (basic-auth user for the pg-shared role)
#   password              - password for the authentik PG role on pg-shared
#   bootstrap_password    - initial akadmin password
#   bootstrap_token       - initial akadmin API token
#   github_client_id      - GitHub OAuth App client id
#   github_client_secret  - GitHub OAuth App client secret
# (the databases namespace reads ONLY username/password from this same path for
#  the CNPG managed role; see apps/databases/templates/consumers.yaml)
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: authentik-config
  namespace: {{ .Release.Namespace }}
spec:
  type: kv-v2
  mount: {{ .Values.vault.mount }}
  path: {{ .Values.vault.path }}
  destination:
    name: {{ .Values.vault.secretName }}
    create: true
  refreshAfter: {{ .Values.vault.refreshAfter }}
  vaultAuthRef: authentik
{{- end }}
