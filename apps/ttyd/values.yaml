replicaCount: 1

image:
  repository: docker.io/stevegore/ttyd
  tag: "latest"
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 250Mi

service:
  type: ClusterIP
  port: 8788

restarter:
  schedule: "*/30 * * * *"
  image: bitnami/kubectl:latest
