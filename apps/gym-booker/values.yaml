replicaCount: 1

image:
  repository: syd.ocir.io/sdajdczqv0qo/gym-booker
  tag: "latest"
  pullPolicy: IfNotPresent

# OCIR pull secret — manual bootstrap once after the namespace first syncs
# (same pattern as garmin-mcp):
#   kubectl -n gym-booker create secret docker-registry ocir-creds \
#     --docker-server=syd.ocir.io \
#     --docker-username='sdajdczqv0qo/oracleidentitycloudservice/steve.j.gore@gmail.com' \
#     --docker-password="$(vault kv get -field=auth_token kv/oci/ocir)"
imagePullSecrets:
  - name: ocir-creds

resources:
  requests:
    memory: 64Mi
    cpu: 25m
  limits:
    memory: 256Mi
    cpu: 250m

service:
  type: ClusterIP
  port: 5000

# Booking state (bookings.pickle, token.txt, skip_classes.txt per user),
# previously /var/elixr on pico.
persistence:
  size: 50Gi
  storageClass: oci-bv

# VSO config — secret at kv/gym-booker/config with fields:
#   USERS_YAML — full users.yaml (user credentials, swim schedule, pushover
#                tokens). Mounted at /config/users.yaml; the app reads it via
#                the USERS_CONFIG env var. Deploys to change the schedule:
#                `vault kv patch kv/gym-booker/config USERS_YAML=@users.yaml`
#                (VSO re-syncs within refreshAfter; restart the pod to pick
#                it up immediately).
vault:
  enabled: true
  mount: kv
  path: gym-booker/config
  refreshAfter: 1h
  authRole: vault-secrets-operator
  secretName: gym-booker-config
