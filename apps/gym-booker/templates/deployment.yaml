apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gym-booker.fullname" . }}
  labels:
    {{- include "gym-booker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gym-booker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gym-booker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Image runs as gymuser (uid/gid 1000); fsGroup makes the PVC writable.
      securityContext:
        fsGroup: 1000
      containers:
        - name: gym-booker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: USERS_CONFIG
              value: /config/users.yaml
            - name: TZ
              value: Australia/Sydney
          volumeMounts:
            - name: data
              mountPath: /var/elixr
            - name: config
              mountPath: /config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "gym-booker.fullname" . }}-data
        - name: config
          secret:
            secretName: {{ .Values.vault.secretName }}
            items:
              - key: USERS_YAML
                path: users.yaml
