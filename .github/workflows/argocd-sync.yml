name: ArgoCD Sync

# Triggers an immediate ArgoCD sync when app manifests are merged to main, so
# changes land in seconds instead of waiting for ArgoCD's ~3 min git poll.
# Apps already have syncPolicy.automated (selfHeal + prune), so this only
# accelerates them — it is not the source of truth, the repo is.
#
# Auth: calls the ArgoCD REST API at argocd.stevegore.au as the
# ci-github-actions API account (see apps/argocd/templates/argocd-cm.yaml).
# Requires repo secret ARGOCD_AUTH_TOKEN — generate it with:
#   argocd login argocd.stevegore.au --sso --grpc-web
#   argocd account generate-token --account ci-github-actions
# Uses curl + jq (preinstalled on the runner) rather than the 219 MB argocd CLI.

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'argocd/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App name to sync, or "all" for every app (blank = changed apps only)'
        required: false
        default: ''

concurrency:
  group: argocd-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      ARGOCD: https://argocd.stevegore.au
      ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff changed paths

      - name: Determine target apps
        id: targets
        run: |
          set -euo pipefail
          auth="Authorization: Bearer $ARGOCD_AUTH_TOKEN"
          input='${{ github.event.inputs.app }}'

          if [ "$input" = "all" ]; then
            apps=$(curl -sS -f -H "$auth" "$ARGOCD/api/v1/applications" \
              | jq -r '.items[].metadata.name' | sort -u | tr '\n' ' ')
          elif [ -n "$input" ]; then
            apps="$input"
          else
            # Map changed paths apps/<name>/... -> <name>
            before='${{ github.event.before }}'
            if [ -z "$before" ] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
              before="${{ github.sha }}~1"
            fi
            apps=$(git diff --name-only "$before" '${{ github.sha }}' \
              | grep '^apps/' | cut -d/ -f2 | sort -u | tr '\n' ' ' || true)

            if git diff --name-only "$before" '${{ github.sha }}' | grep -q '^argocd/applicationset.yaml$'; then
              echo "::warning::argocd/applicationset.yaml changed — it is NOT managed by ArgoCD. Apply it manually: kubectl apply --server-side --force-conflicts -f argocd/applicationset.yaml"
            fi
          fi

          echo "Target apps: ${apps:-<none>}"
          echo "apps=$apps" >> "$GITHUB_OUTPUT"

      - name: Sync
        run: |
          set -euo pipefail
          apps='${{ steps.targets.outputs.apps }}'
          if [ -z "${apps// }" ]; then
            echo "No app directories changed; nothing to sync."
            exit 0
          fi

          auth="Authorization: Bearer $ARGOCD_AUTH_TOKEN"
          rc=0
          for app in $apps; do
            echo "::group::Sync $app"

            # App may not exist yet (brand-new dir the ApplicationSet hasn't created).
            if ! curl -sS -f -o /dev/null -H "$auth" "$ARGOCD/api/v1/applications/$app"; then
              echo "App '$app' not found in ArgoCD yet (new app dir?). The ApplicationSet will create it on its next git poll; skipping."
              echo "::endgroup::"
              continue
            fi

            # Trigger a sync (prune to match the automated syncPolicy).
            curl -sS -f -o /dev/null -H "$auth" -H 'Content-Type: application/json' \
              -X POST "$ARGOCD/api/v1/applications/$app/sync" -d '{"prune": true}'

            # Wait up to 5 min for the operation to finish + app to go Healthy.
            ok=0
            for _ in $(seq 1 60); do
              json=$(curl -sS -f -H "$auth" "$ARGOCD/api/v1/applications/$app")
              sync=$(jq -r '.status.sync.status // "Unknown"' <<<"$json")
              health=$(jq -r '.status.health.status // "Unknown"' <<<"$json")
              phase=$(jq -r '.status.operationState.phase // "—"' <<<"$json")
              echo "$app: sync=$sync health=$health op=$phase"

              case "$phase" in
                Failed|Error)
                  echo "::error::$app sync operation $phase"
                  break
                  ;;
              esac
              if [ "$sync" = "Synced" ] && [ "$health" = "Healthy" ] \
                 && { [ "$phase" = "Succeeded" ] || [ "$phase" = "—" ]; }; then
                ok=1
                break
              fi
              sleep 5
            done

            [ "$ok" = 1 ] || { echo "::error::$app did not reach Synced/Healthy in time"; rc=1; }
            echo "::endgroup::"
          done
          exit $rc
