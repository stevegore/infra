# CNI chaining conflist consumed by cilium-agent (cni.customConf=true,
# cni.configMap=cni-configuration). Cilium writes this to /etc/cni/net.d as
# 05-cilium.conflist so it sorts ahead of flannel's own 10-flannel.conflist and
# wins. The chain preserves OKE flannel's exact plugin set — flannel (IPAM +
# vxlan veth) then portmap (hostPort support) — and appends cilium-cni, which
# attaches eBPF policy/visibility to the veth flannel just created.
#
# Mirrors the live kube-flannel-cfg cni-conf.json (cniVersion 0.3.1, flannel
# delegate hairpinMode + isDefaultGateway, portmap portMappings). If OKE ever
# changes that base conf, re-sync this to match.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cni-configuration
  namespace: kube-system
data:
  cni-config: |-
    {
      "name": "generic-veth",
      "cniVersion": "0.3.1",
      "plugins": [
        {
          "type": "flannel",
          "delegate": {
            "hairpinMode": true,
            "isDefaultGateway": true
          }
        },
        {
          "type": "portmap",
          "capabilities": { "portMappings": true }
        },
        {
          "type": "cilium-cni",
          "chaining-mode": "generic-veth"
        }
      ]
    }
